apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-operator
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: mysql-operator
  template:
    metadata:
      labels:
        app: mysql-operator
    spec:
      serviceAccountName: admin
      containers:
      - name: mysql-operatop
        image: roflmaoinmysoul/mysql-operator:1.0.0
        ports:
        - containerPort: 80