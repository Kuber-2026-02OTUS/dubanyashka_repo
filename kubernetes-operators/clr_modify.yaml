apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mysql-operator-role

rules:

- apiGroups: ["otus.homework"]
  resources: ["mysqls"]
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete

- apiGroups: [""]
  resources: ["services"]
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete

- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete

- apiGroups: [""]
  resources: ["persistentvolumes"]
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete