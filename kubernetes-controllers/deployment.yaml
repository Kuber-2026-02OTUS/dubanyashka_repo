apiVersion: apps/v1
kind: Deployment
metadata:
  name: webserver-pod
  namespace: homework
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app: homework
  template:
    metadata:
      labels:
        app: homework
    spec:
      nodeSelector:
        app: homework
      containers:
      - name: server
        image: python:3.10.20-alpine3.22
        readinessProbe:
          exec:
            command:
              - cat
              - /homework/index.html  
        workingDir: /homework
        command: ["python3", "-m", "http.server", "8000"]
        volumeMounts:
        - name: workdir
          mountPath: /homework
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "rm /homework/index.html", "-f"]
      initContainers:
      - name: install
        image: busybox:1.36.1-musl
        command: ["/bin/sh", "-c"]
        args:
          - wget "-O" "/init/index.html" http://example.com
        volumeMounts:
        - name: workdir
          mountPath: /init
      volumes:
      - name: workdir
        emptyDir: {}
