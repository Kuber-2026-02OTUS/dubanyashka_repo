apiVersion: v1
kind: ServiceAccount
metadata:
    name: {{ .Values.serviceAccount.name }}
  
---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: {{ .Values.serviceAccount.name }}-cr
rules:
  - nonResourceURLs:
      - "/metrics"
    verbs:
      - get
    
---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.serviceAccount.name }}-clr
subjects:
- kind: ServiceAccount  
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Values.serviceAccount.name }}-cr
  apiGroup: rbac.authorization.k8s.io