apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress
  namespace: homework
spec:
  ingressClassName: nginx  # Specifies the NGINX controller
  rules:
  - host: homework.otus     
    http:
      paths:
      - path: /metrics.html
        pathType: Exact
        backend:
          service:
            name: webserver-service
            port:
              number: 80

